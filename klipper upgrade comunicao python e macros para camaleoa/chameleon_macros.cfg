########################################################################################################################
# chameleon_macros.cfg — 3D Chameleon K1 Max
# Comunicação via USB Serial → Pico usando gcode_shell_command
#
# Setup:
#   1. Pico conectado via USB na K1
#   2. chameleon_bridge.py em /usr/data/chameleon_bridge.py
#   3. pip3 install pyserial
#   4. gcode_shell_command.py em /usr/share/klipper/klippy/extras/
#   5. Verificar porta: ls /dev/ttyACM* /dev/ttyUSB*
#   6. Ajustar ARDUINO_PORT no chameleon_bridge.py se necessário
#
# No printer.cfg adicionar:
#   [include chameleon_macros.cfg]
#
# Switch do hotend conectado direto no Pico GPIO9
# Não precisa de filament_switch_sensor no printer.cfg
#
# Start Gcode Creality Print:
#   CHAMELEON_PRINT_START TOOL=[initial_no_support_extruder]
#
# End Gcode:
#   CHAMELEON_PRINT_END
########################################################################################################################


# ══════════════════════════════════════════════════════════════════════════════
# SHELL COMMAND
# ══════════════════════════════════════════════════════════════════════════════

[gcode_shell_command chameleon_cmd]
command: python3 /usr/data/printer_data/config/chameleon/chameleon_client.py
timeout: 120
verbose: True

[gcode_shell_command chameleon_daemon_start]
command: /bin/sh /usr/data/printer_data/config/chameleon/chameleon-daemon.init start
timeout: 10
verbose: False

[delayed_gcode CHAMELEON_DAEMON_AUTOSTART]
initial_duration: 15
gcode:
    RUN_SHELL_COMMAND CMD=chameleon_daemon_start


# ══════════════════════════════════════════════════════════════════════════════
# VARIÁVEIS GLOBAIS
# ══════════════════════════════════════════════════════════════════════════════

[gcode_macro _CHAMELEON_VARS]
variable_tool: 0
variable_enabled: 1
variable_runout_paused: 0
variable_waiting_initial_tool: 0
gcode:
    # macro de variáveis — não executa nada


# ══════════════════════════════════════════════════════════════════════════════
# FIL_CUT — ativa buffer drain, Z hop, retrai, corta e vai para posição de purga
#
# Fluxo:
#   1. BUFFER_DRAIN → Pico esvazia buffer se cheio, ativa modo drain em background
#                     responde imediatamente, macro continua
#   2. Z hop +5mm relativo à peça atual
#   3. Move para cortador, retrai 40mm + corte duplo + retrai 70mm
#      (retração enche buffer → Pico esvazia automaticamente)
#   4. Move para posição de purga X304 Y250 Z0.2 e aguarda
#      RESTORE feito somente após Purga
# ══════════════════════════════════════════════════════════════════════════════

[gcode_macro CHAMELEON_ENABLE]
description: Ativa o MMU 3D Chameleon
gcode:
    SET_GCODE_VARIABLE MACRO=_CHAMELEON_VARS VARIABLE=enabled VALUE=1
    RESPOND MSG="Chameleon: MMU ativado."


[gcode_macro CHAMELEON_DISABLE]
description: Desativa o MMU para imprimir com filamento externo
gcode:
    SET_GCODE_VARIABLE MACRO=_CHAMELEON_VARS VARIABLE=enabled VALUE=0
    RESPOND MSG="Chameleon: MMU desativado. Comandos de troca serao ignorados."


[gcode_macro Fil_Cut]
description: Ativa buffer drain, Z hop, retrai, corta e vai para posição de purga
gcode:
    SAVE_GCODE_STATE NAME=troca_state
    {% set z_hop = 5.0 %}
    {% set max_z = printer.toolhead.axis_maximum.z %}
    {% set cur_z = printer.toolhead.position.z %}
    {% set safe_z = [cur_z + z_hop, max_z] | min %}

    # 1. Pico entra em modo BUFFER_DRAIN — responde imediatamente
    RESPOND MSG="🐍 Fil_Cut: ativando buffer drain..."
    RUN_SHELL_COMMAND CMD=chameleon_cmd PARAMS="BUFFER_DRAIN"

    # 2. Z hop seguro antes de mover
    G90
    G0 Z{safe_z} F3000

    # 3. Move para cortador
    RESPOND MSG="🐍 Fil_Cut: movendo para cortador..."
    G90
    M83

    G0 X34 Y280 F15000
    G1 E-38 F800              # Retrai 40mm rapido

    G0 X24 Y280 F15000
    G0 Y305 F1000

    # 4. Corte duplo
    RESPOND MSG="🐍 Fil_Cut: cortando..."
    G0 X7 F2000
    G0 X24 F10000
    G0 X7 F2000
    G0 X24 Y280 F10000

    G1 E-50 F1500              # Retrai 50mm rapido apos corte

    # 5. Move para posição de purga e aguarda novo filamento
    RESPOND MSG="Fil_Cut: corte concluido, chamando unload..."


# ══════════════════════════════════════════════════════════════════════════════
# PURGA — bico já está na posição X304 Y250 Z0.2 vindo do Fil_Cut
# ══════════════════════════════════════════════════════════════════════════════

[gcode_macro FIL_CUT_END]
description: Corte final - retrai, corta e faz unload sem ir para purga
gcode:
    {% set vars = printer["gcode_macro _CHAMELEON_VARS"] %}
    {% set enabled = vars.enabled|int %}
    {% set current_tool = vars.tool|int %}

    {% if not enabled %}
        RESPOND MSG="Chameleon: MMU desativado, FIL_CUT_END ignorado."
    {% else %}
        {% set z_hop = 5.0 %}
        {% set max_z = printer.toolhead.axis_maximum.z %}
        {% set cur_z = printer.toolhead.position.z %}
        {% set safe_z = [cur_z + z_hop, max_z] | min %}

        RESPOND MSG="Chameleon End: buffer drain..."
        RUN_SHELL_COMMAND CMD=chameleon_cmd PARAMS="BUFFER_DRAIN"

        G90
        G0 Z{safe_z} F3000

        RESPOND MSG="Chameleon End: movendo para cortador..."
        M83
        G0 X34 Y280 F15000
        G1 E-30 F800
        G0 X24 Y280 F15000
        G0 Y305 F1000

        RESPOND MSG="Chameleon End: cortando..."
        G0 X5 F2000
        G0 X24 F10000
        G0 X5 F2000
        G0 X24 Y280 F10000
        G4 P1500
        G1 E-50 F1500
        
        M400 
        
        G4 P500  
        
   

        RESPOND MSG="Chameleon End: descarregando T{current_tool}..."
        RUN_SHELL_COMMAND CMD=chameleon_cmd PARAMS="T{current_tool}"
        RUN_SHELL_COMMAND CMD=chameleon_cmd PARAMS="UNLOAD"
    {% endif %}

[gcode_macro Purga]
gcode:
    {% set current_temp = printer.extruder.target %}
    G90
    M83

    RESPOND MSG="Purga: formando torre na borda..."
    G0 X300 Y250 F15000
    G0 Z0.20 F2000


    G1 E70 F350
    G0 Z2 F1000 
    
    M106 S255
    
    G1 E10 F250
    G0 Z3 F1000
    G1 E10 F250
    G0 Z4 F1000
    G1 E10 F250
    G0 Z5 F1000
    G1 E10 F250
    G0 Z6 F1000
    G1 E-1 F300

    G4 P3000

    RESPOND MSG="Purga: empurrando descarte para fora da mesa..."
    G0 Z15  F1000
    G0 X280  F16000
    G0 Z2 F1000
    G0 X304 F6000
  

    G0 Z3 F3000
    M106 S0

    RESPOND MSG="Purga: limpando bico no silicone..."
    G0 X301 Y280 F15000
    G0 Y250 F15000
    G0 Y290 F15000
    G0 Y250 F15000
    G0 Y290 F15000
    G0 Y250 F15000

    RESPOND MSG="Purga: concluida."
    M104 S{current_temp}
    RESTORE_GCODE_STATE NAME=troca_state MOVE=0


[gcode_macro Purga_Inicial]
gcode:
    {% set current_temp = printer.extruder.target %}
    G90
    M83

    RESPOND MSG="Purga inicial: formando torre maior na borda..."
    G0 X300 Y250 F15000
    G0 Z0.20 F2000


    G1 E70 F350
    G0 Z2 F1000

    M106 S255

    G1 E20 F250
    G0 Z3 F1000
    G1 E20 F250
    G0 Z4 F1000
    G1 E20 F250
    G0 Z5 F1000
    G1 E10 F300
    G0 Z6 F1000
    G1 E10 F250
    G0 Z7 F1000
    G1 E10 F1000
    G0 Z9 F1000
    G1 E10 F1000
    G0 Z8 F1000
    G1 E10 F1000
    G0 Z10 F1000
    G1 E-0.2 F300

    G4 P3000

    RESPOND MSG="Purga inicial: empurrando descarte para fora da mesa..."
    G0 Z15  F1000
    G0 X280  F16000
    G0 Z2 F1000
    G0 X304 F6000


    G0 Z3 F3000
    M106 S0

    RESPOND MSG="Purga inicial: limpando bico no silicone..."
    G0 X301 Y280 F15000
    G0 Y250 F15000
    G0 Y290 F15000
    G0 Y250 F15000
    G0 Y290 F15000
    G0 Y250 F15000

    RESPOND MSG="Purga inicial: concluida."
    M104 S{current_temp}
    RESTORE_GCODE_STATE NAME=troca_state MOVE=0




# ══════════════════════════════════════════════════════════════════════════════
# LOAD_ATE_SENSOR — Pico empurra até GPIO9 acionar
# Se filamento já presente retorna imediatamente
# Após Load OK o buffer ativa automaticamente no Pico
# ══════════════════════════════════════════════════════════════════════════════

[gcode_macro Load_Ate_Sensor]
description: LOAD contínuo — para quando sensor hotend GPIO9 acionar
gcode:
    RESPOND MSG="🐍 Load: empurrando até sensor..."
    RUN_SHELL_COMMAND CMD=chameleon_cmd PARAMS="LOAD"
    RESPOND MSG="🐍 Load: filamento chegou ao sensor!"


# ══════════════════════════════════════════════════════════════════════════════
# SEQUÊNCIA DE TROCA COMPLETA
#
# Fluxo:
#   1. Fil_Cut         → BUFFER_DRAIN + Z hop + retrai + corta + vai para purga
#   2. T{atual}+UNLOAD → Pico sai do drain + descarrega até sensor saída
#   3. T{novo}         → seletor move para novo gate
#   4. Load_Ate_Sensor → Pico empurra até GPIO9 acionar → buffer ativa
#   5. Purga           → purga + limpa + volta para peça
# ══════════════════════════════════════════════════════════════════════════════

[gcode_macro CHAMELEON_ENSURE_LOADED]
description: Seleciona a tool pedida, carrega e faz purga
gcode:
    {% set TOOL = params.TOOL|default(printer["gcode_macro _CHAMELEON_VARS"].tool)|int %}
    {% set vars = printer["gcode_macro _CHAMELEON_VARS"] %}
    {% set enabled = vars.enabled|int %}

    {% if not enabled %}
        RESPOND MSG="Chameleon: MMU desativado, ensure loaded ignorado."
    {% else %}
        RESPOND MSG="Chameleon: garantindo T{TOOL} carregada..."
        SAVE_GCODE_STATE NAME=troca_state
        RUN_SHELL_COMMAND CMD=chameleon_cmd PARAMS="ENSURE_LOADED {TOOL}"
        SET_GCODE_VARIABLE MACRO=_CHAMELEON_VARS VARIABLE=tool VALUE={TOOL}
        RESPOND MSG="Chameleon: T{TOOL} verificada."
    {% endif %}


[gcode_macro CHAMELEON_ENSURE_LOADED_INITIAL]
description: Seleciona a tool inicial, carrega e faz purga inicial se precisar
gcode:
    {% set TOOL = params.TOOL|default(printer["gcode_macro _CHAMELEON_VARS"].tool)|int %}
    {% set vars = printer["gcode_macro _CHAMELEON_VARS"] %}
    {% set enabled = vars.enabled|int %}

    {% if not enabled %}
        RESPOND MSG="Chameleon: MMU desativado, ensure loaded inicial ignorado."
    {% else %}
        RESPOND MSG="Chameleon: garantindo T{TOOL} carregada para inicio..."
        SAVE_GCODE_STATE NAME=troca_state
        RUN_SHELL_COMMAND CMD=chameleon_cmd PARAMS="ENSURE_LOADED_INITIAL {TOOL}"
        SET_GCODE_VARIABLE MACRO=_CHAMELEON_VARS VARIABLE=tool VALUE={TOOL}
        RESPOND MSG="Chameleon: T{TOOL} inicial verificada."
    {% endif %}


[gcode_macro _CHAMELEON_CHANGE]
description: Sequência completa de troca de tool
gcode:
    {% set NEW_TOOL = params.TOOL|int %}
    {% set vars = printer["gcode_macro _CHAMELEON_VARS"] %}
    {% set current_tool = vars.tool %}
    {% set enabled = vars.enabled|int %}
    {% set waiting_initial_tool = vars.waiting_initial_tool|int %}

    {% if not enabled %}
        RESPOND MSG="Chameleon: MMU desativado, ignorando T{NEW_TOOL}."
    {% elif waiting_initial_tool %}
        SET_GCODE_VARIABLE MACRO=_CHAMELEON_VARS VARIABLE=waiting_initial_tool VALUE=0
        CHAMELEON_ENSURE_LOADED_INITIAL TOOL={NEW_TOOL}
        RESPOND MSG="Chameleon: primeira ferramenta T{NEW_TOOL} selecionada pelo fatiador."
    {% elif current_tool == NEW_TOOL %}
        CHAMELEON_ENSURE_LOADED TOOL={NEW_TOOL}
        RESPOND MSG="🐍 T{NEW_TOOL} já está ativa, ignorando."
    {% else %}
        RESPOND MSG="🐍 ═══════════════════════════════"
        RESPOND MSG="🐍 Troca: T{current_tool} → T{NEW_TOOL}"
        RESPOND MSG="🐍 ═══════════════════════════════"

        # 1. Buffer drain + Z hop + corte + move para purga
        Fil_Cut
        M400

        # 2. Pico sai do modo drain e descarrega até sensor de saída
        RESPOND MSG="🐍 Descarregando T{current_tool}..."
        RUN_SHELL_COMMAND CMD=chameleon_cmd PARAMS="T{current_tool}"
        RUN_SHELL_COMMAND CMD=chameleon_cmd PARAMS="UNLOAD"

        # 3. Seleciona novo gate
        RESPOND MSG="🐍 Selecionando T{NEW_TOOL}..."
        RUN_SHELL_COMMAND CMD=chameleon_cmd PARAMS="T{NEW_TOOL}"

        # 4. Empurra novo filamento até GPIO9 acionar — buffer ativa automaticamente
        RESPOND MSG="🐍 Carregando T{NEW_TOOL}..."
        Load_Ate_Sensor

        # 5. Purga direto — bico já está na posição
        Purga

        # 6. Atualiza tool ativa
        SET_GCODE_VARIABLE MACRO=_CHAMELEON_VARS VARIABLE=tool VALUE={NEW_TOOL}

        RESPOND MSG="🐍 ✅ Troca concluída! Tool ativa: T{NEW_TOOL}"
    {% endif %}


# ══════════════════════════════════════════════════════════════════════════════
# T0 / T1 / T2 / T3 — chamadas pelo slicer
# ══════════════════════════════════════════════════════════════════════════════

[gcode_macro T0]
gcode: _CHAMELEON_CHANGE TOOL=0

[gcode_macro T1]
gcode: _CHAMELEON_CHANGE TOOL=1

[gcode_macro T2]
gcode: _CHAMELEON_CHANGE TOOL=2

[gcode_macro T3]
gcode: _CHAMELEON_CHANGE TOOL=3


# ══════════════════════════════════════════════════════════════════════════════
# PRINT_START / PRINT_END
# ══════════════════════════════════════════════════════════════════════════════

[gcode_macro CHAMELEON_PRINT_START]
description: Inicializa Chameleon no início da impressão
gcode:
    {% set INITIAL_TOOL = params.TOOL|default(0)|int %}
    {% set vars = printer["gcode_macro _CHAMELEON_VARS"] %}
    {% set enabled = vars.enabled|int %}
    {% if not enabled %}
        RESPOND MSG="Chameleon: MMU desativado, usando filamento externo."
    {% endif %}

    RESPOND MSG="🐍 Chameleon: iniciando com T{INITIAL_TOOL}..."

    {% if enabled %}
        SET_GCODE_VARIABLE MACRO=_CHAMELEON_VARS VARIABLE=runout_paused VALUE=0
        RUN_SHELL_COMMAND CMD=chameleon_cmd PARAMS="RUNOUT_RESET"
        RUN_SHELL_COMMAND CMD=chameleon_cmd PARAMS="HOME"
        SET_GCODE_VARIABLE MACRO=_CHAMELEON_VARS VARIABLE=waiting_initial_tool VALUE=1
        RESPOND MSG="Chameleon: aguardando T0/T1/T2/T3 do fatiador."
    {% endif %}
    RESPOND MSG="🐍 Chameleon: pronto para imprimir!"


[gcode_macro CHAMELEON_PRINT_END]
description: Finaliza Chameleon no fim da impressão
gcode:
    {% set vars = printer["gcode_macro _CHAMELEON_VARS"] %}
    {% set enabled = vars.enabled|int %}
    {% if enabled %}
        FIL_CUT_END
        RUN_SHELL_COMMAND CMD=chameleon_cmd PARAMS="STOP_PRINT"
    {% else %}
        RESPOND MSG="Chameleon: MMU desativado, finalizando impressao externa."
    {% endif %}
    RESPOND MSG="🐍 Chameleon: impressão finalizada."


# ══════════════════════════════════════════════════════════════════════════════
# RUNOUT — chamado pelo bridge quando Pico detecta fim de filamento
# ══════════════════════════════════════════════════════════════════════════════

[gcode_macro CHAMELEON_RUNOUT]
description: Chamado pelo bridge quando Pico detecta fim de filamento
gcode:
    {% set TOOL = params.TOOL|default(0)|int %}
    {% set vars = printer["gcode_macro _CHAMELEON_VARS"] %}
    {% set already_paused = vars.runout_paused|int %}
    {% if already_paused %}
        RESPOND MSG="Chameleon: fim de filamento T{TOOL} ja pausado, ignorando repeticao."
    {% else %}
    RESPOND MSG="🐍 ⚠️ Fim de filamento T{TOOL}! Pausando..."
        SET_GCODE_VARIABLE MACRO=_CHAMELEON_VARS VARIABLE=runout_paused VALUE=1
        PAUSE
    {% endif %}


[gcode_macro CHAMELEON_RUNOUT_RESET]
description: Libera a trava de pause por fim de filamento
gcode:
    SET_GCODE_VARIABLE MACRO=_CHAMELEON_VARS VARIABLE=runout_paused VALUE=0
    RUN_SHELL_COMMAND CMD=chameleon_cmd PARAMS="RUNOUT_RESET"
    RESPOND MSG="Chameleon: trava de runout resetada."


# ══════════════════════════════════════════════════════════════════════════════
# UTILITÁRIOS
# ══════════════════════════════════════════════════════════════════════════════

[gcode_macro CHAMELEON_HOME]
gcode:
    RUN_SHELL_COMMAND CMD=chameleon_cmd PARAMS="HOME"

[gcode_macro CHAMELEON_STATUS]
gcode:
    {% set vars = printer["gcode_macro _CHAMELEON_VARS"] %}
    RESPOND MSG="🐍 Tool ativa: T{vars.tool}"
    {% if printer["gcode_macro _CHAMELEON_VARS"].enabled|int %}
        RUN_SHELL_COMMAND CMD=chameleon_cmd PARAMS="STATUS"
    {% else %}
        RESPOND MSG="Chameleon: MMU desativado."
    {% endif %}


# ══════════════════════════════════════════════════════════════════════════════
# SELEÇÃO MANUAL — testes
# ══════════════════════════════════════════════════════════════════════════════

[gcode_macro TS0]
gcode:
    RUN_SHELL_COMMAND CMD=chameleon_cmd PARAMS="HOME"
    RUN_SHELL_COMMAND CMD=chameleon_cmd PARAMS="T0"

[gcode_macro TS1]
gcode:
    RUN_SHELL_COMMAND CMD=chameleon_cmd PARAMS="HOME"
    RUN_SHELL_COMMAND CMD=chameleon_cmd PARAMS="T1"

[gcode_macro TS2]
gcode:
    RUN_SHELL_COMMAND CMD=chameleon_cmd PARAMS="HOME"
    RUN_SHELL_COMMAND CMD=chameleon_cmd PARAMS="T2"

[gcode_macro TS3]
gcode:
    RUN_SHELL_COMMAND CMD=chameleon_cmd PARAMS="HOME"
    RUN_SHELL_COMMAND CMD=chameleon_cmd PARAMS="T3"


# ══════════════════════════════════════════════════════════════════════════════
# CARGA / DESCARGA MANUAL — testes
# ══════════════════════════════════════════════════════════════════════════════

[gcode_macro LOAD_FILAMENT_0]
gcode:
    RUN_SHELL_COMMAND CMD=chameleon_cmd PARAMS="HOME"
    RUN_SHELL_COMMAND CMD=chameleon_cmd PARAMS="T0"
    Load_Ate_Sensor
    SET_GCODE_VARIABLE MACRO=_CHAMELEON_VARS VARIABLE=tool VALUE=0

[gcode_macro LOAD_FILAMENT_1]
gcode:
    RUN_SHELL_COMMAND CMD=chameleon_cmd PARAMS="HOME"
    RUN_SHELL_COMMAND CMD=chameleon_cmd PARAMS="T1"
    Load_Ate_Sensor
    SET_GCODE_VARIABLE MACRO=_CHAMELEON_VARS VARIABLE=tool VALUE=1

[gcode_macro LOAD_FILAMENT_2]
gcode:
    RUN_SHELL_COMMAND CMD=chameleon_cmd PARAMS="HOME"
    RUN_SHELL_COMMAND CMD=chameleon_cmd PARAMS="T2"
    Load_Ate_Sensor
    SET_GCODE_VARIABLE MACRO=_CHAMELEON_VARS VARIABLE=tool VALUE=2

[gcode_macro LOAD_FILAMENT_3]
gcode:
    RUN_SHELL_COMMAND CMD=chameleon_cmd PARAMS="HOME"
    RUN_SHELL_COMMAND CMD=chameleon_cmd PARAMS="T3"
    Load_Ate_Sensor
    SET_GCODE_VARIABLE MACRO=_CHAMELEON_VARS VARIABLE=tool VALUE=3

[gcode_macro UNLOAD_FILAMENT_0]
gcode:
    RUN_SHELL_COMMAND CMD=chameleon_cmd PARAMS="HOME"
    RUN_SHELL_COMMAND CMD=chameleon_cmd PARAMS="T0"
    RUN_SHELL_COMMAND CMD=chameleon_cmd PARAMS="UNLOAD"

[gcode_macro UNLOAD_FILAMENT_1]
gcode:
    RUN_SHELL_COMMAND CMD=chameleon_cmd PARAMS="HOME"
    RUN_SHELL_COMMAND CMD=chameleon_cmd PARAMS="T1"
    RUN_SHELL_COMMAND CMD=chameleon_cmd PARAMS="UNLOAD"

[gcode_macro UNLOAD_FILAMENT_2]
gcode:
    RUN_SHELL_COMMAND CMD=chameleon_cmd PARAMS="HOME"
    RUN_SHELL_COMMAND CMD=chameleon_cmd PARAMS="T2"
    RUN_SHELL_COMMAND CMD=chameleon_cmd PARAMS="UNLOAD"

[gcode_macro UNLOAD_FILAMENT_3]
gcode:
    RUN_SHELL_COMMAND CMD=chameleon_cmd PARAMS="HOME"
    RUN_SHELL_COMMAND CMD=chameleon_cmd PARAMS="T3"
    RUN_SHELL_COMMAND CMD=chameleon_cmd PARAMS="UNLOAD"
